<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Societiz — Score ton offre</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
:root{
  --primary:#3B30E8;--primary-light:#EEF0FF;--primary-dark:#2920C4;
  --accent:#F5A623;--green:#16A34A;--red:#DC2626;--yellow:#D97706;
  --bg:#FAFAFA;--surface:#FFFFFF;--border:#E5E7EB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
}
body{font-family:'Nunito','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
[dir=rtl] body{font-family:'Noto Sans Arabic','Nunito',sans-serif}

/* TOPBAR */
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:100}
.logo-img{height:30px;width:auto}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}

/* PROGRESS */
.progress-wrap{height:5px;background:var(--border);flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#7C3AED);transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* MAIN */
.main{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;opacity:0;pointer-events:none;transform:translateY(28px);transition:all .4s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}
.screen.exit{opacity:0;transform:translateY(-28px)}

/* INTRO */
.intro-wrap{max-width:660px;width:100%;text-align:center}
.dots-row{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
.dot{width:10px;height:10px;border-radius:50%}
.intro-badge{display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:800;padding:5px 14px;border-radius:999px;margin-bottom:16px;text-transform:uppercase;letter-spacing:.6px}
.intro-h1{font-size:clamp(24px,4vw,42px);font-weight:900;line-height:1.2;margin-bottom:14px}
.intro-h1 span{color:var(--primary)}
.intro-p{font-size:14px;color:var(--text2);line-height:1.7;max-width:500px;margin:0 auto 16px}
.time-pill{display:inline-flex;align-items:center;gap:6px;background:#FEF9C3;color:#92400E;font-size:12px;font-weight:700;padding:6px 16px;border-radius:999px;margin-bottom:16px;border:1px solid #FDE68A}
.alert-box{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:1.5px solid #F59E0B;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;text-align:left;max-width:500px;margin-left:auto;margin-right:auto}
[dir=rtl] .alert-box{text-align:right}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-text{font-size:13px;line-height:1.6;color:#92400E;font-weight:600}
.alert-text strong{color:#78350F}
.mrr-box{background:linear-gradient(135deg,var(--primary),#6366F1);border-radius:14px;padding:18px 22px;color:#fff;display:flex;align-items:center;justify-content:space-between;max-width:500px;margin:0 auto 22px;gap:16px}
[dir=rtl] .mrr-box{flex-direction:row-reverse}
.mrr-left .mrr-num{font-size:34px;font-weight:900;direction:ltr;unicode-bidi:isolate}
.mrr-left .mrr-sub{font-size:11px;opacity:.8;margin-top:2px}
.mrr-right{font-size:12px;opacity:.85;line-height:1.6;max-width:240px;text-align:left}
[dir=rtl] .mrr-right{text-align:right}
.start-btn{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:15px 40px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 6px 24px rgba(59,48,232,.35)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,48,232,.45)}

/* QUESTION */
.q-wrap{max-width:600px;width:100%}
.q-step{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-step-dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}
.q-title{font-size:clamp(19px,3.2vw,28px);font-weight:900;line-height:1.25;margin-bottom:6px}
.q-hint{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.q-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s;resize:none;line-height:1.6}
.q-input:focus{border-color:var(--primary)}
.q-input::placeholder{color:var(--text3)}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:600;color:var(--text2);background:var(--surface)}
.choice:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);transform:translateX(4px)}
[dir=rtl] .choice:hover{transform:translateX(-4px)}
.choice.sel-yes{border-color:var(--green);background:#F0FDF4;color:var(--green)}
.choice.sel-no{border-color:var(--red);background:#FFF1F1;color:var(--red)}
.choice.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.choice-key{width:26px;height:26px;border-radius:7px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.choice.sel .choice-key,.choice.sel-yes .choice-key,.choice.sel-no .choice-key{background:currentColor;color:#fff}
.q-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:10px}
.q-next{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:11px 26px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 14px rgba(59,48,232,.3)}
.q-next:hover{background:var(--primary-dark);transform:translateY(-1px)}
.q-back{background:none;border:1.5px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s}
.q-back:hover{border-color:var(--text2);color:var(--text)}
.enter-hint{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.enter-key{background:var(--border);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700}
.reaction{margin-top:12px;animation:fadeUp .3s ease}
.rbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700}
.rbadge.good{background:#DCFCE7;color:#15803D}
.rbadge.warn{background:#FEF9C3;color:#A16207}
.rbadge.bad{background:#FEE2E2;color:#B91C1C}
.rbadge.neutral{background:var(--primary-light);color:var(--primary)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ASSIST BUTTON */
.assist-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);margin-top:10px;transition:all .2s}
.assist-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ASSIST PANEL */
.assist-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:16px}
.assist-overlay.open{display:flex}
.assist-panel{background:var(--surface);border-radius:20px;width:100%;max-width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.assist-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.assist-title{font-size:14px;font-weight:800;color:var(--text)}
.assist-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);line-height:1}
.assist-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:120px}
.amsg{display:flex;gap:8px;align-items:flex-end;animation:fadeUp .2s ease}
.amsg.u{flex-direction:row-reverse}
.amsg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.amsg-av.b{background:linear-gradient(135deg,var(--primary),#6366F1)}
.amsg-av.u{background:var(--accent)}
.amsg-bubble{max-width:82%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.amsg-bubble.b{background:var(--bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.amsg-bubble.u{background:var(--primary);color:#fff;border-bottom-right-radius:3px}
.assist-inp-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border)}
.assist-inp{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--bg)}
.assist-inp:focus{border-color:var(--primary);background:#fff}
.assist-send{background:var(--primary);border:none;border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.assist-send:disabled{opacity:.4;cursor:not-allowed}
.assist-send svg{width:14px;height:14px;fill:#fff}
.tdots{display:flex;gap:3px;padding:3px 0}
.td{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce .9s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(1);opacity:.5}40%{transform:scale(1.3);opacity:1}}

/* PRICING */
.pricing-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.price-card{border:2px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;background:var(--surface)}
.price-card:hover{border-color:var(--primary);background:var(--primary-light)}
.price-card.sel{border-color:var(--primary);background:var(--primary-light)}
.price-card-icon{font-size:20px;margin-bottom:6px}
.price-card-title{font-size:12px;font-weight:800;color:var(--text);margin-bottom:3px}
.price-card-range{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:4px}
.price-card-desc{font-size:10px;color:var(--text2);line-height:1.4}
.price-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.price-input-wrap{background:var(--bg);border-radius:10px;padding:12px}
.price-input-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.price-input-row{display:flex;align-items:center;gap:6px}
.price-input-row span{font-size:14px;font-weight:800;color:var(--primary)}
.price-inp{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:15px;font-weight:800;font-family:inherit;color:var(--text);background:var(--surface);outline:none;width:100%;transition:border-color .2s}
.price-inp:focus{border-color:var(--primary)}
.price-tip{background:var(--primary-light);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--primary);font-weight:600;line-height:1.6;display:none}
.price-tip.show{display:block}

/* NICHE */
.niche-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.niche-card{border:2px solid var(--border);border-radius:10px;padding:10px 13px;cursor:pointer;transition:all .2s;background:var(--surface);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2)}
.niche-card:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.niche-card.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.niche-icon{font-size:16px;flex-shrink:0}

/* NOT GPT PILL */
.not-gpt-pill{display:inline-flex;align-items:center;gap:5px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:999px;padding:4px 12px;font-size:11px;font-weight:700;color:#15803D;margin-top:6px;margin-left:8px}

/* FORMULA */
.formula-wrap{max-width:600px;width:100%}
.formula-box{background:var(--primary-light);border:2px solid rgba(59,48,232,.15);border-radius:14px;padding:20px;margin-bottom:16px}
.formula-label{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.formula-text{font-size:15px;font-weight:700;color:var(--text);line-height:2.3}
.f-inp{background:#fff;border:1.5px dashed rgba(59,48,232,.3);border-radius:7px;padding:2px 10px;font-size:13px;font-weight:700;color:var(--primary);font-family:inherit;outline:none;min-width:100px;max-width:180px;transition:all .2s}
.f-inp:focus{border-color:var(--primary);border-style:solid}
.f-inp::placeholder{color:rgba(59,48,232,.4);font-weight:600}

/* RESULT */
.result-wrap{max-width:600px;width:100%;text-align:center;padding-bottom:24px}
.score-ring{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;position:relative}
.score-ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--rc,var(--primary)) var(--rd,0deg),#E5E7EB var(--rd,0deg));transition:all 1.2s ease}
.score-ring::after{content:'';position:absolute;inset:11px;border-radius:50%;background:var(--surface)}
.score-inner{position:relative;z-index:1}
.score-big{font-size:42px;font-weight:900;line-height:1}
.score-sub{font-size:12px;color:var(--text2);font-weight:600}
.res-title{font-size:22px;font-weight:900;margin-bottom:8px}
.res-sub{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6;max-width:440px;margin-left:auto;margin-right:auto}
.blocks-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.bcard{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:1.5px solid var(--border)}
.bcard.g{border-color:#BBF7D0;background:#F0FDF4}.bcard.w{border-color:#FDE68A;background:#FFFBEB}.bcard.b{border-color:#FECACA;background:#FFF1F1}
.bcard-num{font-size:20px;font-weight:900}
.bcard.g .bcard-num{color:var(--green)}.bcard.w .bcard-num{color:var(--yellow)}.bcard.b .bcard-num{color:var(--red)}
.bcard-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-top:3px}
.recos{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;text-align:left}
[dir=rtl] .recos{text-align:right}
.reco{display:flex;gap:9px;padding:11px 13px;border-radius:10px;font-size:13px;line-height:1.6;align-items:flex-start}
.reco.g{background:#F0FDF4;border:1px solid #BBF7D0}.reco.w{background:#FFFBEB;border:1px solid #FDE68A}.reco.b{background:#FFF1F1;border:1px solid #FECACA}
.reco-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.cta-box{border-radius:14px;padding:22px;color:#fff;text-align:center;margin-bottom:10px}
.cta-box h3{font-size:17px;font-weight:900;margin-bottom:6px}
.cta-box p{font-size:12px;opacity:.85;margin-bottom:14px;line-height:1.6}
.cta-box-btn{background:#fff;border:none;border-radius:10px;padding:11px 26px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.cta-box-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.open-chat-link{background:none;border:none;font-size:13px;color:var(--primary);font-weight:700;cursor:pointer;font-family:inherit;text-decoration:underline;margin-top:8px}

/* CHAT SCREEN */
.chat-full{max-width:600px;width:100%;display:flex;flex-direction:column;height:calc(100vh - 110px)}
.chat-header{background:linear-gradient(135deg,var(--primary),#6366F1);border-radius:14px 14px 0 0;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-av{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.chat-info{flex:1}
.chat-name{color:#fff;font-size:13px;font-weight:800}
.chat-status{color:rgba(255,255,255,.7);font-size:11px}
.chat-online{width:7px;height:7px;border-radius:50%;background:#22C55E;border:2px solid #fff}
.chat-back-btn{background:rgba(255,255,255,.15);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;font-family:inherit}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:#F9FAFB;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.cmsg{display:flex;gap:7px;align-items:flex-end;animation:fadeUp .2s ease}
.cmsg.u{flex-direction:row-reverse}
.cmsg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.cmsg-av.b{background:linear-gradient(135deg,var(--primary),#6366F1)}
.cmsg-av.u{background:var(--accent)}
.cbubble{max-width:82%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.cbubble.b{background:#fff;border:1px solid var(--border);border-bottom-left-radius:3px}
.cbubble.u{background:var(--primary);color:#fff;border-bottom-right-radius:3px}
.chat-inp-row{display:flex;gap:8px;padding:11px 13px;border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;background:var(--surface);flex-shrink:0}
.chat-inp{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;resize:none;max-height:70px;background:var(--bg)}
.chat-inp:focus{border-color:var(--primary);background:#fff}
.chat-send{background:var(--primary);border:none;border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-send svg{width:14px;height:14px;fill:#fff}

@media(max-width:600px){
  .pricing-cards{grid-template-columns:1fr}
  .price-inputs{grid-template-columns:1fr}
  .blocks-row{grid-template-columns:1fr}
  .niche-grid{grid-template-columns:1fr}
  html,body{overflow:auto}
  .screen{position:relative;min-height:calc(100vh - 100px);opacity:1!important;transform:none!important;pointer-events:all!important}
  .screen:not(.active){display:none}
  .chat-full{height:auto}
  .chat-msgs{max-height:260px}
}
</style>
</head>
<body>

<div class="topbar">
  <img id="logo-img" class="logo-img" alt="Societiz"/>
  <div class="topbar-right">
    <button class="lang-btn active" onclick="setLang('fr')" id="lb-fr">FR</button>
    <button class="lang-btn" onclick="setLang('ar')" id="lb-ar">AR</button>
    <button class="lang-btn" onclick="setLang('en')" id="lb-en">EN</button>
  </div>
</div>
<div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>

<div class="main" id="main">

<!-- INTRO -->
<div class="screen active" id="sc-intro">
  <div class="intro-wrap">
    <div class="dots-row">
      <div class="dot" style="background:#9B59B6"></div>
      <div class="dot" style="background:#2ECC71"></div>
      <div class="dot" style="background:#F5A623"></div>
    </div>
    <div class="intro-badge" id="i-badge"></div>
    <h1 class="intro-h1" id="i-h1"></h1>
    <div class="time-pill" id="i-time"></div>
    <p class="intro-p" id="i-desc"></p>
    <div class="alert-box"><div class="alert-icon">⚠️</div><div class="alert-text" id="i-alert"></div></div>
    <div class="mrr-box">
      <div class="mrr-left">
        <div class="mrr-num" id="i-mrr-num"></div>
        <div class="mrr-sub" id="i-mrr-sub"></div>
      </div>
      <div class="mrr-right" id="i-mrr-right"></div>
    </div>
    <button class="start-btn" id="i-start" onclick="startQuiz()"></button>
  </div>
</div>

<!-- QUESTION -->
<div class="screen" id="sc-q">
  <div class="q-wrap">
    <div class="q-step" id="q-step"><div class="q-step-dot"></div><span id="q-step-txt"></span></div>
    <div class="q-title" id="q-title"></div>
    <div class="q-hint" id="q-hint"></div>
    <div id="q-content"></div>
    <div id="q-reaction"></div>
    <div id="q-assist-wrap"></div>
    <div class="q-nav">
      <button class="q-back" id="q-back" onclick="prevQ()"></button>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="enter-hint" id="q-enter-hint"></div>
        <button class="q-next" id="q-next" onclick="nextQ()"></button>
      </div>
    </div>
  </div>
</div>

<!-- PRICING -->
<div class="screen" id="sc-price">
  <div class="q-wrap">
    <div class="q-step"><div class="q-step-dot"></div><span id="price-step-txt"></span></div>
    <div class="q-title" id="price-title"></div>
    <div class="q-hint" id="price-hint"></div>
    <div class="pricing-cards" id="pricing-cards"></div>
    <div class="price-inputs">
      <div class="price-input-wrap">
        <div class="price-input-label" id="price-monthly-label"></div>
        <div class="price-input-row"><span>$</span><input class="price-inp" type="number" id="price-monthly" min="1" placeholder="49" oninput="updatePriceTip()"/></div>
      </div>
      <div class="price-input-wrap">
        <div class="price-input-label" id="price-yearly-label"></div>
        <div class="price-input-row"><span>$</span><input class="price-inp" type="number" id="price-yearly" min="1" placeholder="470" oninput="updatePriceTip()"/></div>
      </div>
    </div>
    <div class="price-tip" id="price-tip"></div>
    <div class="q-nav" style="margin-top:16px">
      <button class="q-back" onclick="goScreen('q'); qIndex=questions.length-1; renderQ()"></button>
      <button class="q-next" onclick="nextPrice()"></button>
    </div>
  </div>
</div>

<!-- NICHE -->
<div class="screen" id="sc-niche">
  <div class="q-wrap">
    <div class="q-step"><div class="q-step-dot"></div><span id="niche-step-txt"></span></div>
    <div class="q-title" id="niche-title"></div>
    <div class="q-hint" id="niche-hint"></div>
    <div class="niche-grid" id="niche-grid"></div>
    <div id="niche-reaction" style="margin-top:12px"></div>
    <div class="q-nav" style="margin-top:16px">
      <button class="q-back" onclick="goScreen('price')"></button>
      <button class="q-next" id="niche-next" onclick="nextNiche()"></button>
    </div>
  </div>
</div>

<!-- FORMULA -->
<div class="screen" id="sc-formula">
  <div class="formula-wrap">
    <div class="q-step"><div class="q-step-dot"></div><span id="f-step-txt"></span></div>
    <div class="q-title" id="f-title"></div>
    <div class="q-hint" id="f-hint"></div>
    <div class="formula-box">
      <div class="formula-label" id="f-label"></div>
      <div class="formula-text" id="f-text"></div>
    </div>
    <div class="q-nav">
      <button class="q-back" onclick="goScreen('niche')"></button>
      <button class="q-next" onclick="goResult()"></button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="sc-result" style="overflow-y:auto;padding:28px 24px 40px">
  <div class="result-wrap">
    <div class="score-ring" id="score-ring"><div class="score-inner"><div class="score-big" id="score-big">0</div><div class="score-sub">/100</div></div></div>
    <div class="res-title" id="res-title"></div>
    <div class="res-sub" id="res-sub"></div>
    <div class="blocks-row" id="blocks-row"></div>
    <div class="recos" id="recos"></div>
    <div class="cta-box" id="cta-box"></div>
    <div style="text-align:center"><button class="open-chat-link" id="open-chat-link" onclick="openChat()"></button></div>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="sc-chat" style="padding:16px 24px">
  <div class="chat-full">
    <div class="chat-header">
      <div class="chat-av">🤖</div>
      <div class="chat-info"><div class="chat-name" id="chat-name"></div><div class="chat-status" id="chat-status"></div></div>
      <div class="chat-online"></div>
      <button class="chat-back-btn" id="chat-back-btn" onclick="goScreen('result')"></button>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-inp-row">
      <textarea class="chat-inp" id="chat-inp" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMainChat()}"></textarea>
      <button class="chat-send" id="chat-send" onclick="sendMainChat()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
    </div>
  </div>
</div>

</div><!-- /main -->

<!-- ASSIST OVERLAY -->
<div class="assist-overlay" id="assist-overlay" onclick="if(event.target===this)closeAssist()">
  <div class="assist-panel">
    <div class="assist-header">
      <div class="assist-title" id="assist-title"></div>
      <button class="assist-close" onclick="closeAssist()">✕</button>
    </div>
    <div class="assist-msgs" id="assist-msgs"></div>
    <div class="assist-inp-row">
      <input class="assist-inp" id="assist-inp" onkeydown="if(event.key==='Enter')sendAssist()" placeholder="..."/>
      <button class="assist-send" id="assist-send" onclick="sendAssist()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
    </div>
  </div>
</div>

// ── STATE
let lang='fr',qIndex=0,answers={},questions=[],totalScore=0;
let selectedNiche=null,selectedPriceModel=null;
let mainChatHistory=[],mainChatInit=false;
let assistHistory=[],currentAssistContext='';

function setLang(l){
  lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr';
  document.documentElement.lang=l;
  ['fr','ar','en'].forEach(x=>document.getElementById('lb-'+x).classList.toggle('active',x===l));
  questions=getQuestions();
  applyIntro();
  if(currentScreen==='q') renderQ();
}

function applyIntro(){
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v};
  set('i-badge',t('badge'));set('i-h1',t('h1'));set('i-time',t('time'));
  set('i-desc',t('desc'));set('i-alert',t('alert'));
  set('i-mrr-num',t('mrr_num'));set('i-mrr-sub',t('mrr_sub'));set('i-mrr-right',t('mrr_right'));
  set('i-start',t('start'));
}

let currentScreen='intro';
function goScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','exit'));
  const el=document.getElementById('sc-'+name);
  if(el){el.classList.add('active');currentScreen=name;}
}

function startQuiz(){
  questions=getQuestions();
  qIndex=0;answers={};totalScore=0;selectedNiche=null;selectedPriceModel=null;
  goScreen('q');renderQ();setProgress(0);
}

function renderQ(){
  const q=questions[qIndex];if(!q)return;
  const total=questions.length+3; // +pricing +niche +formula
  const stepN=qIndex+1;
  document.getElementById('q-step-txt').textContent=`${stepN} ${t('step_of')} ${total}`;
  document.getElementById('q-title').textContent=q.title;
  document.getElementById('q-hint').textContent=q.hint||'';
  document.getElementById('q-reaction').innerHTML='';
  document.getElementById('q-assist-wrap').innerHTML='';
  document.getElementById('q-enter-hint').innerHTML=`<span class="enter-key">↵</span> ${t('enter')}`;
  document.getElementById('q-back').textContent=t('back');
  document.getElementById('q-back').style.display=qIndex===0?'none':'block';
  document.getElementById('q-next').textContent=t('next');
  const saved=answers[q.id];
  const content=document.getElementById('q-content');
  if(q.type==='textarea'){
    content.innerHTML=`<textarea class="q-input" id="q-inp" rows="3" placeholder="${q.ph||''}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();nextQ()}">${saved||''}</textarea>`;
    setTimeout(()=>document.getElementById('q-inp')?.focus(),80);
    if(q.hasAssist){
      document.getElementById('q-assist-wrap').innerHTML=`
        <button class="assist-btn" onclick="openAssist('${q.id}')">${t('assist')}</button>
        <div class="not-gpt-pill" id="not-gpt-pill">${t('not_gpt')}</div>`;
    }
  }else if(q.type==='choice'){
    content.innerHTML=`<div class="choices">${q.choices.map((c,i)=>`<div class="choice ${saved===c.val?'sel-'+c.type:''}" onclick="selectChoice('${c.val}','${c.type}')" id="c-${c.val}"><div class="choice-key">${['A','B'][i]}</div>${c.label}</div>`).join('')}</div>`;
  }else if(q.type==='choice3'){
    content.innerHTML=`<div class="choices">${q.choices.map((c,i)=>`<div class="choice ${saved===c.val?'sel':''}" onclick="selectChoice3('${c.val}')" id="c-${c.val}"><div class="choice-key">${['A','B','C'][i]}</div>${c.label}</div>`).join('')}</div>`;
  }
  if(saved) showReaction(q.reaction(saved));
}

function selectChoice(val,type){
  const q=questions[qIndex];answers[q.id]=val;
  document.querySelectorAll('.choice').forEach(e=>e.classList.remove('sel-yes','sel-no','sel'));
  document.getElementById('c-'+val)?.classList.add('sel-'+type);
  showReaction(q.reaction(val));
  setTimeout(()=>nextQ(),550);
}
function selectChoice3(val){
  const q=questions[qIndex];answers[q.id]=val;
  document.querySelectorAll('.choice').forEach(e=>e.classList.remove('sel','sel-yes','sel-no'));
  document.getElementById('c-'+val)?.classList.add('sel');
  showReaction(q.reaction(val));
  setTimeout(()=>nextQ(),550);
}
function showReaction(r){
  document.getElementById('q-reaction').innerHTML=`<div class="reaction"><div class="rbadge ${r.t}">${r.m}</div></div>`;
}
function nextQ(){
  const q=questions[qIndex];
  const inp=document.getElementById('q-inp');
  if(inp) answers[q.id]=inp.value.trim();
  if(!answers[q.id]&&q.type==='textarea'){inp?.focus();return;}
  if(!answers[q.id]) return;
  totalScore+=q.score(answers[q.id]);
  qIndex++;
  setProgress(Math.round(((qIndex)/(questions.length+3))*100));
  const sc=document.getElementById('sc-q');
  sc.classList.add('exit');
  setTimeout(()=>{sc.classList.remove('exit');
    if(qIndex>=questions.length){showPricing();}else{renderQ();}
  },200);
}
function prevQ(){
  if(qIndex===0){goScreen('intro');return;}
  const prev=questions[qIndex-1];
  if(answers[prev.id]) totalScore-=prev.score(answers[prev.id]);
  qIndex--;
  setProgress(Math.round((qIndex/(questions.length+3))*100));
  renderQ();
}

// ── PRICING
function showPricing(){
  goScreen('price');
  const total=questions.length+3;
  document.getElementById('price-step-txt').textContent=`${questions.length+1} ${t('step_of')} ${total}`;
  document.getElementById('price-title').textContent=t('price_title');
  document.getElementById('price-hint').textContent=t('price_hint');
  document.getElementById('price-monthly-label').textContent=t('price_monthly');
  document.getElementById('price-yearly-label').textContent=t('price_yearly');
  document.querySelector('#sc-price .q-back').textContent=t('back');
  document.querySelector('#sc-price .q-next').textContent=t('next');
  const models=getPricingModels();
  document.getElementById('pricing-cards').innerHTML=models.map(m=>`
    <div class="price-card ${selectedPriceModel===m.id?'sel':''}" onclick="selectPriceModel('${m.id}')" id="pm-${m.id}">
      <div class="price-card-icon">${m.icon}</div>
      <div class="price-card-title">${m.title}</div>
      <div class="price-card-range">${m.range}</div>
      <div class="price-card-desc">${m.desc}</div>
    </div>`).join('');
  if(answers.price_monthly) document.getElementById('price-monthly').value=answers.price_monthly;
  if(answers.price_yearly) document.getElementById('price-yearly').value=answers.price_yearly;
  setProgress(Math.round(((questions.length+1)/(questions.length+3))*100));
}
function selectPriceModel(id){
  selectedPriceModel=id;
  document.querySelectorAll('.price-card').forEach(e=>e.classList.remove('sel'));
  document.getElementById('pm-'+id)?.classList.add('sel');
  updatePriceTip();
}
function updatePriceTip(){
  const m=document.getElementById('price-monthly').value;
  const y=document.getElementById('price-yearly').value;
  const tip=document.getElementById('price-tip');
  if(!m) return;
  const monthly=parseFloat(m);
  const idealYearly=Math.round(monthly*10); // ~2 months free
  const range=selectedPriceModel==='diy'?{min:19,max:49}:selectedPriceModel==='diwy'?{min:49,max:99}:{min:99,max:999};
  let msg='';
  if(monthly<range.min||monthly>range.max){
    msg=lang==='ar'?`💡 السعر الموصى به لهذا النموذج: $${range.min} – $${range.max}/شهر`:lang==='en'?`💡 Recommended price for this model: $${range.min} – $${range.max}/month`:`💡 Prix recommandé pour ce modèle : $${range.min} – $${range.max}/mois`;
  }
  if(m&&!y){
    const annualMsg=lang==='ar'?` · السعر السنوي المثالي: $${idealYearly} (شهرين مجاناً)`:lang==='en'?` · Ideal annual price: $${idealYearly} (2 months free)`:` · Prix annuel idéal : $${idealYearly} (2 mois offerts)`;
    msg+=annualMsg;
  }
  if(msg){tip.textContent=msg;tip.classList.add('show');}else{tip.classList.remove('show');}
}
function nextPrice(){
  const m=document.getElementById('price-monthly').value;
  if(!m){document.getElementById('price-monthly').focus();return;}
  answers.price_monthly=m;
  answers.price_yearly=document.getElementById('price-yearly').value;
  answers.price_model=selectedPriceModel;
  // Score pricing
  const monthly=parseFloat(m);
  const range=selectedPriceModel==='diy'?{min:19,max:49}:selectedPriceModel==='diwy'?{min:49,max:99}:{min:99,max:999};
  const priceScore=monthly>=range.min&&monthly<=range.max?10:monthly>range.max*0.5&&monthly<range.max*1.5?5:2;
  totalScore+=priceScore;
  showNiche();
}

// ── NICHE
function showNiche(){
  goScreen('niche');
  const total=questions.length+3;
  document.getElementById('niche-step-txt').textContent=`${questions.length+2} ${t('step_of')} ${total}`;
  document.getElementById('niche-title').textContent=t('niche_title');
  document.getElementById('niche-hint').textContent=t('niche_hint');
  document.querySelector('#sc-niche .q-back').textContent=t('back');
  document.getElementById('niche-next').textContent=t('next');
  const niches=NICHES[lang]||NICHES.fr;
  document.getElementById('niche-grid').innerHTML=niches.map(n=>`
    <div class="niche-card ${selectedNiche===n.id?'sel':''}" onclick="selectNiche('${n.id}','${n.pa}')" id="nc-${n.id}">
      <span class="niche-icon">${n.icon}</span>${n.label}
    </div>`).join('');
  setProgress(Math.round(((questions.length+2)/(questions.length+3))*100));
}
function selectNiche(id,pa){
  selectedNiche=id;answers.niche=id;answers.niche_pa=parseInt(pa);
  document.querySelectorAll('.niche-card').forEach(e=>e.classList.remove('sel'));
  document.getElementById('nc-'+id)?.classList.add('sel');
  // Score niche vs problem
  const nicheScore=parseInt(pa)*2; // max 10
  // Cross with outcome quality
  const outLen=answers.outcome?.length||0;
  const selfDone=answers.self==='yes';
  const nicheBonus=outLen>50&&selfDone?nicheScore:Math.floor(nicheScore*0.6);
  answers.niche_score=nicheBonus;
  totalScore+=nicheBonus;
  const msg=parseInt(pa)>=4
    ? (lang==='ar'?'💰 نيش ذو قدرة شرائية عالية — ممتاز':lang==='en'?'💰 High purchasing power niche — excellent':'💰 Niche à fort pouvoir d\'achat — excellent')
    : parseInt(pa)===3
    ? (lang==='ar'?'✅ نيش جيد — تأكد من تقديم قيمة واضحة':lang==='en'?'✅ Good niche — ensure clear value':'✅ Bon niche — assure-toi de proposer une valeur claire')
    : (lang==='ar'?'💡 قدرة شرائية منخفضة — ستحتاج إلى ضمان واضح وقيمة استثنائية':lang==='en'?'💡 Low purchasing power — you\'ll need a clear guarantee and exceptional value':'💡 Faible pouvoir d\'achat — tu auras besoin d\'une garantie claire et d\'une valeur exceptionnelle');
  document.getElementById('niche-reaction').innerHTML=`<div class="rbadge ${parseInt(pa)>=4?'good':parseInt(pa)===3?'neutral':'warn'}">${msg}</div>`;
}
function nextNiche(){
  if(!selectedNiche){return;}
  showFormula();
}

// ── FORMULA
function showFormula(){
  goScreen('formula');
  const total=questions.length+3;
  document.getElementById('f-step-txt').textContent=`${questions.length+3} ${t('step_of')} ${total}`;
  document.getElementById('f-title').textContent=t('f_title');
  document.getElementById('f-hint').textContent=t('f_hint');
  document.getElementById('f-label').textContent=t('f_label');
  document.querySelector('#sc-formula .q-back').textContent=t('back');
  document.querySelector('#sc-formula .q-next').textContent=t('calc');

  const outcome=answers.outcome?.slice(0,35)||'';
  const help=lang==='ar'?'أساعد':lang==='en'?'I help':'J\'aide';
  const to=lang==='ar'?'على':lang==='en'?'to':'à';
  const inn=lang==='ar'?'في':lang==='en'?'in':'en';
  const without=lang==='ar'?'بدون':lang==='en'?'without':'sans';
  const timePh=lang==='ar'?'[المدة]':lang==='en'?'[duration]':'[durée]';

  document.getElementById('f-text').innerHTML=`
    <strong>${help}</strong>
    <input class="f-inp" id="f-icp" value="${icp}" placeholder="${lang==='ar'?'عميلك المثالي':lang==='en'?'your ICP':'ton ICP'}"/>

    <input class="f-inp" id="f-outcome" value="${outcome}" placeholder="${lang==='ar'?'النتيجة':lang==='en'?'result':'résultat'}"/>
    ${inn}
    <input class="f-inp" id="f-time" value="" placeholder="${timePh}" style="min-width:80px"/>
    ${without}
    <input class="f-inp" id="f-effort" value="" placeholder="${effortPh}"/>`;

function goResult(){
  answers.f_icp=document.getElementById('f-icp')?.value||'';
  answers.f_outcome=document.getElementById('f-outcome')?.value||'';
  answers.f_time=document.getElementById('f-time')?.value||'';
  answers.f_effort=document.getElementById('f-effort')?.value||'';
  const allFilled=answers.f_icp&&answers.f_outcome&&answers.f_time&&answers.f_effort;
  const formulaScore=allFilled&&answers.f_icp.length>5&&answers.f_outcome.length>5&&answers.f_time.length>2&&answers.f_effort.length>5?5:allFilled?2:0;
  totalScore+=formulaScore;
  totalScore=Math.min(100,totalScore);
  goScreen('result');
  renderResult();
  setProgress(100);
}

// ── RESULT
function renderResult(){
  const s=totalScore;
  const color=s>=80?'#16A34A':s>=60?'#D97706':'#DC2626';
  const deg=Math.round((s/100)*360);
  const ring=document.getElementById('score-ring');
  ring.style.setProperty('--rc',color);
  ring.style.setProperty('--rd',deg+'deg');
  document.getElementById('score-big').textContent=s;
  document.getElementById('score-big').style.color=color;
  const key=s>=80?'great':s>=60?'mid':'bad';
  document.getElementById('res-title').textContent=t('res_'+key);
  document.getElementById('res-title').style.color=color;
  document.getElementById('res-sub').textContent=t('res_'+key+'_sub');
  // Breakdown
  const s1=Math.min(30,(answers.self==='yes'?10:0)+(answers.helped==='yes'?10:0)+(answers.paid==='yes'?5:2)+(answers.outcome?.length>20?3:0));
  const s2=Math.min(20,(answers.icp?.length>50?10:5)+(answers.fear?.length>20?5:0)+(answers.dream?.length>20?5:0));
  const s3=Math.max(0,s-s1-s2);
  const gc=(v,m)=>v/m>=.7?'g':v/m>=.5?'w':'b';
  document.getElementById('blocks-row').innerHTML=[
    {v:s1,m:30,l:t('b1')},{v:Math.max(0,s2),m:20,l:t('b2')},{v:Math.max(0,s3),m:50,l:t('b3')}
  ].map(b=>`<div class="bcard ${gc(b.v,b.m)}"><div class="bcard-num">${b.v}</div><div class="bcard-lbl">${b.l}</div><div style="font-size:10px;color:var(--text3)">/${b.m}</div></div>`).join('');

    const res=await fetch('/api/chat',{

      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,
        system:mainChatHistory[0].content,
        messages:mainChatHistory.slice(1).filter(m=>m.role!=='system').concat([{role:'user',content:msg}])})
    });
    const data=await res.json();
    document.getElementById('mtyp')?.remove();
    addMainMsg('b',data.content?.[0]?.text||'...');
  }catch(e){document.getElementById('mtyp')?.remove();addMainMsg('b','...');}
  document.getElementById('chat-send').disabled=false;
  // Save conversation to Firebase (background)
  saveConversationToFirebase();
}

async function saveConversationToFirebase(){
  try{
    const sessionId = 'session_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const payload = {
      timestamp: new Date().toISOString(),
      lang: lang,
      score: totalScore,
      answers: {
        outcome: answers.outcome||'',
        self: answers.self||'',
        helped: answers.helped||'',
        icp: answers.icp||'',
        niche: answers.niche||'',
        price_model: answers.price_model||'',
        price_monthly: answers.price_monthly||'',
        guarantee: answers.guarantee||'',
      },
      conversation_length: mainChatHistory.filter(m=>m.role!=='system').length,
      messages: mainChatHistory.filter(m=>m.role!=='system').slice(-20)
    };
    await fetch(`https://firestore.googleapis.com/v1/projects/societiz-app/databases/(default)/documents/score_conversations/${sessionId}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields:{
        timestamp:{stringValue:payload.timestamp},
        lang:{stringValue:payload.lang},
        score:{integerValue:payload.score},
        niche:{stringValue:payload.answers.niche},
        price_model:{stringValue:payload.answers.price_model},
        conversation_length:{integerValue:payload.conversation_length},
        data:{stringValue:JSON.stringify(payload)}
      }})
    });
  }catch(e){/* silent */}
}

function setProgress(pct){document.getElementById('prog').style.width=pct+'%';}

// INIT
applyIntro();
questions=getQuestions();
